name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld

    # 🚀 [핵심 조치] 이전의 찌꺼기(y 에러 유발자)가 남아있는 빌도저 임시 폴더를 완전히 밀어버립니다.
    - name: Build APK within Virtual Environment
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install "cython==0.29.33"
        pip install "buildozer==1.5.0" python-for-android
        
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 이전 빌드 찌꺼기 완전 삭제(clean) 후 순수 컴파일 진행
        buildozer android clean
        buildozer -v android debug
