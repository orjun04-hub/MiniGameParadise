name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld g++-multilib lib32z1 lib32ncurses6 lib32stdc++6 libstdc++6 tar

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer

    - name: Build APK
      run: |
        # 라이선스 자동 동의
        export BUILDOZER_ACCEPT_SDK_LICENSE=1
        
        # 권한 문제 해결을 위해 빌드 폴더를 미리 생성하고 권한 전체 개방
        rm -rf .buildozer
        mkdir -p .buildozer
        chmod -R 777 .buildozer
        
        # 빌드 도구가 생성하는 모든 파일에 접근 가능하도록 설정
        buildozer -v android debug
        
        # 결과물 권한 강제 변경
        chmod -R 777 bin/
      env:
        MAKEFLAGS: "-j1"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
