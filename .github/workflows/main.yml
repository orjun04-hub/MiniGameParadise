
      run: |
        # 라이선스 자동 동의
        export BUILDOZER_ACCEPT_SDK_LICENSE=1
        
        # 권한 문제 해결을 위해 빌드 폴더를 미리 생성하고 권한 전체 개방
        rm -rf .buildozer
        mkdir -p .buildozer
        chmod -R 777 .buildozer
        
        # 빌드 도구가 생성하는 모든 파일에 접근 가능하도록 설정
        buildozer -v android debug
        
        # 결과물 권한 강제 변경
        chmod -R 777 bin/
      env:
        MAKEFLAGS: "-j1"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
