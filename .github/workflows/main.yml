name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🚀 [오류 박멸 핵심] 기존에 꼬여있던 이전 빌드의 가상환경(venv) 및 .buildozer 폴더 잔재를 완전히 깨끗하게 지워버립니다.
    - name: Clean Existing Cache & Venv
      run: |
        rm -rf venv
        rm -rf .buildozer
        rm -rf .pytest_cache

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld g++-multilib lib32z1 lib32ncurses6 lib32stdc++6 libstdc++6

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer python-for-android

    # 🚀 빌도저가 완전히 무결한 상태에서 새로 다운로드를 시작하도록 clean 명령 후 빌드를 실행합니다.
    - name: Build APK with Buildozer
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: "1"
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
        ANDROID_LAUNCHER_ACCEPT_SDK_LICENSE: "1"
      run: |
        buildozer android clean
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
