name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🚀 [용량 확보] 깃허브 머신의 불필요한 대형 패키지들을 지워 가상 머신 디스크 공간을 확보합니다.
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 🚀 [핵심 조치] Aidl 인식 에러를 해결하기 위해 32비트 호환 라이브러리(g++-multilib, lib32stdc++6)를 강제 주입합니다.
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld g++-multilib lib32z1 lib32ncurses6 lib32stdc++6

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer python-for-android

    - name: Build APK with Buildozer
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: "1"
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
        ANDROID_LAUNCHER_ACCEPT_SDK_LICENSE: "1"
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
