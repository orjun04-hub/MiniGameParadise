name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld

    # 가상환경 내부에서 라이선스 자동 수락 플래그를 환경 변수로 완벽히 주입
    - name: Build APK within Virtual Environment
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROID_LAUNCHER_ACCEPT_SDK_LICENSE: "y"
        ANDROID_LOG_TAGS: "*:v"
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install "cython==0.29.33"
        pip install "buildozer==1.5.0" python-for-android
        
        # SDK 라이선스를 폴더째 사전 승인 처리
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        buildozer -v android debug
