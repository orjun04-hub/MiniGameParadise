name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld g++-multilib lib32z1 lib32ncurses6 lib32stdc++6 libstdc++6 tar

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer

    - name: Build APK
      run: |
        # 빌드 엔진에 직접 스레드 제한 및 환경 변수 전달
        export BUILDOZER_ACCEPT_SDK_LICENSE=1
        export PATH=$PATH:$HOME/.local/bin
        
        # 빌드 엔진 내부 호출 시 사용할 옵션
        # 1. 이전 빌드 완전 초기화
        # 2. 멀티스레딩 완전 차단 (j1)
        rm -rf .buildozer
        buildozer --profile android debug -v
      env:
        MAKEFLAGS: "-j1"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
