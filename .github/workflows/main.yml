name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 시스템 패키지 및 lld 컴파일러 설치
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld

    # 파이썬 및 빌도저 설치 (시스템 전역 패키지 꼬임 방지 플래그 추가)
    - name: Install Python Dependencies
      run: |
        sudo pip3 install --upgrade pip setuptools wheel
        sudo pip3 install "cython<3.0.0" buildozer python-for-android

    # 🚀 핵심 수정: 루트 권한 무시 플래그 및 홈디렉토리 권한을 루트로 통일하여 빌드 가동
    - name: Build APK with Buildozer (Root Mode)
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROID_LAUNCHER_ACCEPT_SDK_LICENSE: "y"
        BUILDOZER_WARN_ON_ROOT: "0"
      run: |
        sudo buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
