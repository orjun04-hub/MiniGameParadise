name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev
        pip install --upgrade pip setuptools
        pip install "cython<3.0.0" buildozer python-for-android

    - name: Configure PIP
      run: |
        mkdir -p ~/.config/pip
        echo -e "[global]\nuser = false" > ~/.config/pip/pip.conf

    - name: Build APK with Buildozer
      run: |
        yes y | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: package
        path: bin/*.apk
