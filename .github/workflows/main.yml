name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 시스템 도구 및 lld를 루트 권한으로 안전하게 사전 설치
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libreadline-dev libffi-dev uuid-dev ccache lld

    # 🚀 핵심 수정: 일반 사용자(runner) 영역에 독립된 가상환경을 파서 파이썬 패키지 충돌을 완벽 차단
    - name: Build APK within Virtual Environment
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROID_LAUNCHER_ACCEPT_SDK_LICENSE: "y"
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer python-for-android
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
